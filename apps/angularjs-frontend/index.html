<!DOCTYPE html>
<html lang="en" ng-app="dataMonetizationApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Monetization Agent — ThinkVerge</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="#!/" class="logo">
        ThinkVerge <span class="logo-tag">Data Monetization Agent</span>
      </a>
      <nav class="nav">
        <a href="#!/"             class="nav-link" ng-class="{ active: isActive('/') }">Dashboard</a>
        <a href="#!/industries"   class="nav-link" ng-class="{ active: isActive('/industries') }">Industries</a>
        <a href="#!/valuation"    class="nav-link" ng-class="{ active: isActive('/valuation') }">Valuation Tool</a>
        <a href="#!/orchestration" class="nav-link" ng-class="{ active: isActive('/orchestration') }">Orchestration</a>
      </nav>
    </div>
  </header>

  <!-- Router outlet -->
  <main class="main-content">
    <div ng-view></div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; 2026 ThinkVerge.in &mdash; Agentic AI Enablement</span>
      <span class="footer-tag">AngularJS 1.x SPA &middot; Deployable via Docker + nginx</span>
    </div>
  </footer>

  <!-- AngularJS 1.8.3 + ngRoute from CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

  <!-- App files -->
  <script src="app.js"></script>
  <script src="services/data.service.js"></script>
  <script src="controllers/dashboard.controller.js"></script>
  <script src="controllers/industries.controller.js"></script>
  <script src="controllers/valuation.controller.js"></script>
  <script src="controllers/orchestration.controller.js"></script>

  <!-- Active route helper on root scope -->
  <script>
    angular.module('dataMonetizationApp').run(['$rootScope', '$location', function ($rootScope, $location) {
      $rootScope.isActive = function (path) {
        return $location.path() === path;
      };
    }]);
  </script>

</body>
</html>
